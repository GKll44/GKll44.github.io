<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GKll44主页</title>
  <link rel="icon" href="/1.png" type="image/png">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      overflow: auto; 
      min-height: 700px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-family: Arial, sans-serif;
      transition: background 10s ease;
      background-size: cover;
      background-attachment: fixed;
    }
    
    /* 打字效果样式 */
    .typing-container {
      cursor: pointer;
      margin-bottom: 20px;
      z-index: 10;
    }
    
    .typing-text {
      font-size: 3rem;
      font-weight: bold;
      position: relative;
      display: inline-block;
    }
    
    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.2em;
      background-color: #fff;
      animation: blink 1s infinite;
      vertical-align: middle;
      margin-left: 5px;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    
    .char {
      display: inline-block;
      color: #fff;
      text-shadow: 0 0 10px currentColor;
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
    }
    
    .wow-text .char {
      animation: rainbowGlow 3s linear infinite;
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
    }
    
    @keyframes rainbowGlow {
      0% { 
        color: #ff0000;
        text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
      }
      16% { 
        color: #ff7f00;
        text-shadow: 0 0 10px #ff7f00, 0 0 20px #ff7f00;
      }
      33% { 
        color: #ffff00;
        text-shadow: 0 0 10px #ffff00, 0 0 20px #ffff00;
      }
      50% { 
        color: #00ff00;
        text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
      }
      66% { 
        color: #0000ff;
        text-shadow: 0 0 10px #0000ff, 0 0 20px #0000ff;
      }
      78% { 
        color: #9400d3;
        text-shadow: 0 0 10px #9400d3, 0 0 20px #9400d3;
      }
      100% { 
        color: #ff0000;
        text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
      }
    }

    .component-background {
      width: 200px;
      height: 200px;
      background-color: rgba(255, 255, 255, 0.692);
      backdrop-filter: blur(6px);
      border-radius: 10px;
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      color: #616161;
      font-size: 24px;
      font-weight: bold;
      z-index: 5; 
      padding: 20px;
      box-sizing: border-box; 
      background-clip: padding-box;
    }
    
    .clock {
      font-family: 'Trebuchet MS', serif;
      font-size: 48px;
      margin-bottom: 20px;
      text-align: center;
    }
    .clock-time {
      font-size: 64px;
    }
    .clock-minute {
      font-size: 64px;
      position: relative;
    }
    .clock-am-pm {
      font-size: 16px;
      position: relative;
      bottom: 29px;
      right: -50px;
    }

    /* 指路区域样式 */
    .guide-section {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 5;
    }

    .guide-title {
      font-size: 28px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 15px;
      text-shadow: 0 0 10px rgba(0,0,0,0.3);
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
    }

    .guide-panel {
      width: 280px;
      min-height: 150px;
      background-color: rgba(0, 0, 0, 0);
      backdrop-filter: blur(6px);
      border-style:double;
      padding: 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .guide-item {
      width: 100%;
      padding: 12px 0px;
      background-color: rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      text-decoration: none;
      color: #f8f8f8;
      font-size: 16px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .guide-item:hover {
      background-color: rgba(255, 255, 255, 0.8);
      transform: translateX(5px);
    }

    .guide-arrow {
      color: #0065fc;
      font-size: 20px;
      margin-left: 10px;
    }

    /* 白天背景 */
    .day-sky {
      background: linear-gradient(to bottom, #87CEEB, #B0E2FF);
    }

    /* 夕阳背景 */
    .sunset-sky {
      background: linear-gradient(to bottom, #FF4500, #FF8C00, #FFD700);
    }

    /* 黑夜背景 */
    .night-sky {
      background: linear-gradient(to bottom, #000033, #000066);
    }
    
    /* 过渡背景类 */
    .sunset-to-night {
      background: linear-gradient(to bottom, #FF8C00, #000066);
    }
    
    .night-to-sunset {
      background: linear-gradient(to bottom, #000066, #FF8C00);
    }
    
    .day-to-sunset {
      background: linear-gradient(to bottom, #B0E2FF, #FFD700);
    }
  </style>
<base target="_blank">
</head>
<body>
  <!-- 打字效果 -->
  <div class="typing-container" id="typing-container">
    <div class="typing-text">
      <span id="typing-text"></span><span class="cursor" id="typing-cursor"></span>
    </div>
  </div>
  
  <!-- 时钟组件 -->
  <div class="component-background">
    <div class="clock">
      <div class="clock-time" id="clock-time">00</div>
      <div class="clock-minute" id="clock-minute">00</div>
      <div class="clock-am-pm" id="clock-am-pm">AM</div>
    </div>
  </div>

  <!-- 指路区域 -->
  <div class="guide-section">
    <div class="guide-title">跳转到</div>
    <div class="guide-panel">
      <a href="https://github.com/GKll44" class="guide-item" target="_blank">
        <span>我的github</span>
        <span class="guide-arrow">→</span>
      </a>
      <a href="https://gkll44.github.io/Raycast3DGame/" class="guide-item" target="_blank">
        <span>伪3D迷宫</span>
        <span class="guide-arrow">→</span>
      </a>

    </div>
    
  </div>

  <script>
    const typingTextElement = document.getElementById('typing-text');
    const typingContainer = document.getElementById('typing-container');
    const initialText = "欢迎来到GKll44的主页！";
    const wowText = "哎呀！点我干嘛？>_<";
    let isTyping = false;
    let currentMode = 'initial';
    
    function typeInitialText() {
      if (isTyping) return;
      isTyping = true;
      currentMode = 'initial';
      typingTextElement.innerHTML = '';
      typingTextElement.className = 'typing-text';
      let currentIndex = 0;
      
      function type() {
        if (currentIndex < initialText.length) {
          const charSpan = document.createElement('span');
          charSpan.textContent = initialText[currentIndex];
          charSpan.classList.add('char');
          charSpan.style.color = '#fff';
          charSpan.style.textShadow = '0 0 5px #fff';
          typingTextElement.appendChild(charSpan);
          
          currentIndex++;
          setTimeout(type, 50);
        } else {
          isTyping = false;
        }
      }
      
      type();
    }
    
    function typeWowText() {
      if (isTyping) return;
      isTyping = true;
      currentMode = 'wow';
      
      let currentLength = typingTextElement.children.length;
      
      function backspace() {
        if (currentLength > 0) {
          typingTextElement.removeChild(typingTextElement.lastChild);
          currentLength--;
          setTimeout(backspace, 30);
        } else {
          let wowIndex = 0;
          
          function typeWow() {
            if (wowIndex < wowText.length) {
              const charSpan = document.createElement('span');
              charSpan.textContent = wowText[wowIndex];
              charSpan.classList.add('char');
              charSpan.style.color = '#ff0000';
              charSpan.style.textShadow = '0 0 10px #ff0000';
              typingTextElement.appendChild(charSpan);
              
              wowIndex++;
              setTimeout(typeWow, 100);
            } else {
              typingTextElement.classList.add('wow-text');
              isTyping = false;
            }
          }
          
          typeWow();
        }
      }
      
      backspace();
    }
    
    // 点击事件处理
    typingContainer.addEventListener('click', function() {
      if (currentMode === 'initial') {
        typeWowText();
      } else {
        typeInitialText();
      }
    });
    
    // 页面加载后开始初始打字效果
    setTimeout(typeInitialText, 500);

    // 时钟和背景效果
    const clockTimeElement = document.getElementById('clock-time');
    const clockMinuteElement = document.getElementById('clock-minute');
    const clockAmPmElement = document.getElementById('clock-am-pm');
    const bodyElement = document.body;

    // 颜色插值函数
    function interpolateColor(color1, color2, factor) {
      const result = color1.slice();
      for (let i = 0; i < 3; i++) {
        result[i] = Math.round(result[i] + factor * (color2[i] - result[i]));
      }
      return result;
    }

    // RGB数组转CSS颜色
    function rgbToCss(rgbArray) {
      return `rgb(${rgbArray[0]}, ${rgbArray[1]}, ${rgbArray[2]})`;
    }

    // 十六进制转RGB数组
    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? [
        parseInt(result[1], 16),
        parseInt(result[2], 16),
        parseInt(result[3], 16)
      ] : [0, 0, 0];
    }

    // 平滑过渡背景
    function updateBackground(hours, minutes) {
      const dayTop = hexToRgb('#87CEEB');
      const dayBottom = hexToRgb('#B0E2FF');
      const sunsetTop = hexToRgb('#FF4500');
      const sunsetBottom = hexToRgb('#FFD700');
      const nightTop = hexToRgb('#000033');
      const nightBottom = hexToRgb('#000066');

      const totalMinutes = hours * 60 + minutes;
      
      const dawnStart = 4 * 60;
      const dawnEnd = 6 * 60;
      const sunsetStart = 17 * 60;
      const sunsetEnd = 19 * 60;
      
      if (totalMinutes >= dawnStart && totalMinutes < dawnEnd) {
        const factor = (totalMinutes - dawnStart) / (dawnEnd - dawnStart);
        const top = interpolateColor(nightTop, dayTop, factor);
        const bottom = interpolateColor(nightBottom, dayBottom, factor);
        bodyElement.style.background = `linear-gradient(to bottom, ${rgbToCss(top)}, ${rgbToCss(bottom)})`;
      } 
      else if (totalMinutes >= sunsetStart && totalMinutes < sunsetEnd) {
        const factor = (totalMinutes - sunsetStart) / (sunsetEnd - sunsetStart);
        
        if (factor < 0.5) {
          const subFactor = factor * 2;
          const top = interpolateColor(dayTop, sunsetTop, subFactor);
          const bottom = interpolateColor(dayBottom, sunsetBottom, subFactor);
          bodyElement.style.background = `linear-gradient(to bottom, ${rgbToCss(top)}, ${rgbToCss(bottom)})`;
        } else {
          const subFactor = (factor - 0.5) * 2;
          const top = interpolateColor(sunsetTop, nightTop, subFactor);
          const bottom = interpolateColor(sunsetBottom, nightBottom, subFactor);
          bodyElement.style.background = `linear-gradient(to bottom, ${rgbToCss(top)}, ${rgbToCss(bottom)})`;
        }
      }
      else if (totalMinutes >= 19 * 60 || totalMinutes < 4 * 60) {
        bodyElement.classList.remove('day-sky', 'sunset-sky');
        bodyElement.classList.add('night-sky');
      }
      else {
        bodyElement.classList.remove('night-sky', 'sunset-sky');
        bodyElement.classList.add('day-sky');
      }
    }

    function updateClock() {
      const now = new Date();
      const hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const amPm = hours >= 12 ? 'PM' : 'AM';
      const displayHours = String(hours % 12 || 12).padStart(2, '0');

      clockTimeElement.textContent = displayHours;
      clockMinuteElement.textContent = minutes;
      clockAmPmElement.textContent = amPm;

      updateBackground(hours, now.getMinutes());
    }

    setInterval(updateClock, 1000);
    updateClock();

    // 监听页面可见变化
    document.addEventListener('visibilitychange', function() {
      if (document.hidden) {
        document.title = "ヾ(￣▽￣)Bye~Bye~";
      } else {
        document.title = "又见面了哦(❁´◡`❁)";
        setTimeout(() => {
          document.title = "GKll44主页";
        }, 1000);
      }
    });

    window.addEventListener('resize', () => {
      const now = new Date();
      updateBackground(now.getHours(), now.getMinutes());
    });
  </script>
</body>
</html>
